<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="s.png">
<title>SafetyTag IoT – Worker Safety Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e5e7eb;
}

/* PRELOADER */
#preloader {
  position: fixed;
  inset: 0;
  background: #020617;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
}

/* LOGIN */
#login {
  max-width: 350px;
  margin: 120px auto;
  background: #020617;
  padding: 30px;
  border-radius: 10px;
}
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}
button {
  background: #22c55e;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard { display: none; padding: 20px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}
.logout {
  background: #ef4444;
  color: white;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #334155;
}

/* STATUS */
.safe { background: #064e3b; }
.warning { background: #78350f; }
.danger { background: #7f1d1d; }

/* ALERT */
.alert-box {
  background: #b91c1c;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  font-weight: bold;
}

/* CHARTS */
.charts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 20px;
}
canvas {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="preloader"></div>

<div id="login">
  <h2>🔐 Dashboard Login</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="checkPassword()">Login</button>
  <p id="login-msg" style="color:red;"></p>
</div>

<div id="dashboard">
  <header>
    <h2> Admin Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </header>

  <div id="alerts"></div>

  <div class="charts">
    <canvas id="gasChart"></canvas>
    <canvas id="hrChart"></canvas>
    <canvas id="tempChart"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>Worker ID</th>
        <th>Gas</th>
        <th>Heart Rate</th>
        <th>Temp (°C)</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="data-table"></tbody>
  </table>
</div>

<audio id="alarmSound">
  <source src="ring.mp3">
</audio>

<script>
/* ========= PRELOADER ========= */
const text = "SAFETY FOR ALL";
let idx = 0;
const preloader = document.getElementById("preloader");
const typer = setInterval(() => {
  preloader.textContent += text[idx++];
  if (idx === text.length) clearInterval(typer);
}, 120);
setTimeout(() => preloader.style.display = "none", 3000);

/* ========= LOGIN ========= */
const PASSWORD = "IOT001";
function checkPassword(){
  if(password.value === PASSWORD){
    login.style.display = "none";
    dashboard.style.display = "block";
    fetchData();
    setInterval(fetchData, 6000);
  } else {
    document.getElementById("login-msg").textContent = "Wrong password!";
  }
}
function logout(){ location.reload(); }

/* ========= GOOGLE APPS SCRIPT ========= */
const SHEET_URL = "YOUR_APPS_SCRIPT_URL";

/* ========= LIMITS ========= */
const GAS_MIN=50, GAS_MAX=200;
const HR_MIN=60, HR_MAX=120;
const TEMP_MIN=36, TEMP_MAX=38;

/* ========= CHART INIT (FIXED) ========= */
const gasCtx = document.getElementById("gasChart").getContext("2d");
const hrCtx = document.getElementById("hrChart").getContext("2d");
const tempCtx = document.getElementById("tempChart").getContext("2d");

const gasChart = new Chart(gasCtx, {
  type: "line",
  data: { labels: [], datasets: [{ label:"Gas Level", data:[] }] }
});
const hrChart = new Chart(hrCtx, {
  type: "line",
  data: { labels: [], datasets: [{ label:"Heart Rate", data:[] }] }
});
const tempChart = new Chart(tempCtx, {
  type: "line",
  data: { labels: [], datasets: [{ label:"Temperature", data:[] }] }
});

/* ========= DATA ========= */
let lastCount = 0;
function status(v,min,max){
  if(v < min) return "warning";
  if(v > max) return "danger";
  return "safe";
}

function fetchData(){
  fetch(SHEET_URL)
  .then(r=>r.json())
  .then(data=>{
    const rows = data.values.slice(1);
    const table = document.getElementById("data-table");
    const alerts = document.getElementById("alerts");
    const alarm = document.getElementById("alarmSound");

    table.innerHTML = "";
    alerts.innerHTML = "";

    if(rows.length > lastCount){
      alarm.play();
      lastCount = rows.length;
    }

    const recent = rows.slice(-10);

    recent.forEach(r=>{
      const [t,id,g,h,temp] = r.map(Number.isNaN? r:r);
      const states = [
        status(g,GAS_MIN,GAS_MAX),
        status(h,HR_MIN,HR_MAX),
        status(temp,TEMP_MIN,TEMP_MAX)
      ];
      const rowClass = states.includes("danger")?"danger":states.includes("warning")?"warning":"safe";

      table.innerHTML += `
        <tr class="${rowClass}">
          <td>${id}</td>
          <td>${g}</td>
          <td>${h}</td>
          <td>${temp}</td>
          <td>${t}</td>
        </tr>
      `;

      if(rowClass==="danger"){
        alerts.innerHTML = `<div class="alert-box">🚨 DANGER: Worker ${id}</div>`;
      }
    });

    updateCharts(recent);
  });
}

function updateCharts(rows){
  gasChart.data.labels = rows.map(r=>r[0]);
  gasChart.data.datasets[0].data = rows.map(r=>r[2]);
  hrChart.data.labels = rows.map(r=>r[0]);
  hrChart.data.datasets[0].data = rows.map(r=>r[3]);
  tempChart.data.labels = rows.map(r=>r[0]);
  tempChart.data.datasets[0].data = rows.map(r=>r[4]);

  gasChart.update();
  hrChart.update();
  tempChart.update();
}
</script>

</body>
</html>
